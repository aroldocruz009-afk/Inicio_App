<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexi Play - Fondo Negro y Refresh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos Generales - FONDO NEGRO ABSOLUTO */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            background-color: #000000; /* Negro puro */
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif;
            padding-bottom: 50px;
            overflow-x: hidden;
        } 

        /* 🔄 PANTALLA DE REFRESH (EFECTO CARGA WEB) */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #222;
            border-top: 5px solid #FF3333; /* Color de tu marca */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* BARRA SUPERIOR (Navbar - Fondo Negro Puro) */
        .navbar {
            background-color: #000000;
            border-bottom: 1px solid #1a1a1a; /* Sutil línea divisoria */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #FF3333;
            text-decoration: none;
            margin-right: 20px;
        }

        .genres-menu {
            display: flex;
            gap: 15px;
            list-style: none;
            overflow-x: auto; 
            white-space: nowrap;
            padding: 5px 0;
            flex-grow: 1;
            margin-right: 20px;
        }
        .genres-menu::-webkit-scrollbar {
            display: none;
        }
        .genres-menu a {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .genres-menu a:hover, .genres-menu a.active {
            color: #ffffff;
        }

        /* Buscador */
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box input {
            background-color: #111;
            border: 1px solid #333;
            color: white;
            padding: 8px 35px 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            width: 200px;
            transition: width 0.4s ease, border-color 0.3s;
        }
        .search-box input:focus {
            width: 240px;
            border-color: #FF3333;
        }
        .search-box i {
            position: absolute;
            right: 12px;
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
        }

        /* 🎞️ ESTILOS DEL SLIDER */
        .slider-container {
            position: relative;
            max-width: 1200px;
            height: 400px;
            margin: 20px auto 0 auto;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.9);
        }
        .slider-wrapper {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slide::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 5%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%);
        }
        .slide-info {
            position: absolute;
            bottom: 40px;
            left: 4%;
            z-index: 10;
            max-width: 500px;
        }
        .slide-info h2 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 15px 12px;
            cursor: pointer;
            font-size: 20px;
            z-index: 11;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .slider-btn:hover { background: #FF3333; }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }
        
        .slider-dots {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 11;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active { background: #FF3333; width: 25px; border-radius: 10px; transition: all 0.3s; }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 🍿 CUADRÍCULA DE 7 PORTADAS POR FILA (Totalmente Negra) */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(7, 110px);
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .movie-card {
            background-color: #000000; /* Fondo negro */
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            width: 110px;
            height: 140px;
        }
        .movie-card.hidden { display: none; }
        .movie-card:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4); /* Resplandor rojo sutil */
        }
        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Adaptación para Pantallas Medianas y Tablets */
        @media (max-width: 950px) {
            .movies-grid { grid-template-columns: repeat(5, 110px); gap: 15px; }
        }

        /* Adaptación para Celulares */
        @media (max-width: 600px) {
            .navbar { flex-wrap: wrap; gap: 10px; padding: 10px 15px; }
            .genres-menu { order: 3; margin-right: 0; width: 100%; }
            .search-box input { width: 140px; }
            .search-box input:focus { width: 170px; }
            .slider-container { height: 220px; margin-top: 10px; }
            .slide-info h2 { font-size: 20px; }
            .movies-grid { grid-template-columns: repeat(3, 110px); gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="loader-overlay" id="pantalla-carga">
        <div class="spinner"></div>
    </div>

    <nav class="navbar">
        <a href="#todos" class="logo">FLEXIPLAY</a>
        <ul class="genres-menu" id="menu-generos">
            <li><a href="#todos" class="active">Inicio</a></li>
            <li><a href="#accion">Acción</a></li>
            <li><a href="#suspenso">Suspenso</a></li>
            <li><a href="#comedia">Comedia</a></li>
            <li><a href="#terror">Terror</a></li>
            <li><a href="#ciencia-ficcion">Ciencia Ficción</a></li>
            <li><a href="#anime">Anime</a></li>
        </ul>
        <div class="search-box">
            <input type="text" id="buscador" placeholder="Buscar Pelicula...">
            <i class="fas fa-search"></i>
        </div>
    </nav>

    <div class="slider-container" id="slider-seccion">
        <button class="slider-btn prev-btn" onclick="moveSlider(-1); event.stopPropagation();"><i class="fas fa-chevron-left"></i></button>
        <button class="slider-btn next-btn" onclick="moveSlider(1); event.stopPropagation();"><i class="fas fa-chevron-right"></i></button>
        
        <div class="slider-wrapper" id="slider-wrapper">
            <div class="slide" data-link="seccion-avatar.html">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80" alt="Banner 1">
                <div class="slide-info"><h2>Avatar: El Camino del Agua</h2></div>
            </div>
            <div class="slide" data-link="paginas/destino-final.html">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80" alt="Banner 2">
                <div class="slide-info"><h2>Estreno: Destino Final 6</h2></div>
            </div>
            <div class="slide" data-link="especial.html">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80" alt="Banner 3">
                <div class="slide-info"><h2>Especial de Terror de la Semana</h2></div>
            </div>
        </div>

        <div class="slider-dots">
            <div class="dot active" onclick="currentSlide(0); event.stopPropagation();"></div>
            <div class="dot" onclick="currentSlide(1); event.stopPropagation();"></div>
            <div class="dot" onclick="currentSlide(2); event.stopPropagation();"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="movies-grid" id="contenedor-peliculas">
            
            <div class="movie-card" data-genre="accion suspenso" data-link="pelicula-john-wick.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=Accion+y+Suspenso" alt="John Wick Pelicula de accion y suspenso">
            </div>
            <div class="movie-card" data-genre="ciencia-ficcion" data-link="link1.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=Avatar" alt="Avatar El Camino del Agua">
            </div>
            <div class="movie-card" data-genre="comedia" data-link="link2.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=Scary+Movie" alt="Scary Movie">
            </div>
            <div class="movie-card" data-genre="terror" data-link="link3.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=El+Conjuro" alt="El Conjuro 3">
            </div>
            <div class="movie-card" data-genre="anime" data-link="link4.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=Dragon+Ball" alt="Dragon Ball Super">
            </div>
            <div class="movie-card" data-genre="accion" data-link="link5.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=Batman" alt="Batman Caballero de la noche">
            </div>
            <div class="movie-card" data-genre="suspenso" data-link="link6.html">
                <img class="movie-poster" src="https://via.placeholder.com/110x140/222/fff?text=Misterio" alt="Pelicula de intriga y suspenso">
            </div>

        </div>
    </div>

    <script>
        // LÓGICA DEL SLIDER
        let slideIndex = 0;
        const wrapper = document.getElementById('slider-wrapper');
        const dots = document.querySelectorAll('.dot');

        function updateSlider() {
            wrapper.style.transform = `translateX(-${(slideIndex * 100) / 3}%)`;
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === slideIndex);
            });
        }

        function moveSlider(direction) {
            slideIndex += direction;
            if (slideIndex > 2) slideIndex = 0;
            if (slideIndex < 0) slideIndex = 2;
            updateSlider();
        }

        function currentSlide(index) {
            slideIndex = index;
            updateSlider();
        }

        let autoSlider = setInterval(() => moveSlider(1), 4000);

        document.getElementById('slider-seccion').addEventListener('mouseenter', () => clearInterval(autoSlider));
        document.getElementById('slider-seccion').addEventListener('mouseleave', () => {
            autoSlider = setInterval(() => moveSlider(1), 4000);
        });

        // REDIRECCIÓN AL DAR CLIC
        const elementosClickables = document.querySelectorAll('.movie-card, .slide');
        elementosClickables.forEach(elemento => {
            elemento.addEventListener('click', function() {
                const destino = this.getAttribute('data-link');
                if (destino) {
                    window.location.href = destino; 
                }
            });
        });

        // 🧠 FILTRADO INTELIGENTE CON EFECTO REFRESH (CARGA)
        const enlacesGeneros = document.querySelectorAll('#menu-generos a, .logo');
        const peliculas = document.querySelectorAll('.movie-card');
        const buscador = document.getElementById('buscador');
        const sliderSeccion = document.getElementById('slider-seccion');
        const pantallaCarga = document.getElementById('pantalla-carga');

        function filtrarPorGenero(hash) {
            const generoSeleccionado = hash.replace('#', '');
            buscador.value = ""; 
            
            // Activar animación de "Refresh" web
            pantallaCarga.classList.add('active');

            // Retrasar el filtrado medio segundo para simular carga real
            setTimeout(() => {
                if(generoSeleccionado === 'todos' || generoSeleccionado === '') {
                    sliderSeccion.style.display = 'block';
                } else {
                    sliderSeccion.style.display = 'none';
                }
                
                peliculas.forEach(pelicula => {
                    const generosPelicula = pelicula.getAttribute('data-genre').split(' ');
                    
                    if (generoSeleccionado === 'todos' || generoSeleccionado === '' || generosPelicula.includes(generoSeleccionado)) {
                        pelicula.classList.remove('hidden');
                    } else {
                        pelicula.classList.add('hidden');
                    }
                });

                enlacesGeneros.forEach(enlace => {
                    enlace.classList.toggle('active', enlace.getAttribute('href') === hash);
                });

                // Quitar la pantalla de carga
                pantallaCarga.classList.remove('active');
            }, 500); // 500 milisegundos de carga (medio segundo)
        }

        enlacesGeneros.forEach(enlace => {
            enlace.addEventListener('click', function() {
                const href = this.getAttribute('href');
                if(href.startsWith('#')) filtrarPorGenero(href);
            });
        });

        // BUSCADOR TEXTUAL
        buscador.addEventListener('input', function() {
            const textoBusqueda = this.value.toLowerCase().trim();
            
            if(textoBusqueda !== "") { sliderSeccion.style.display = 'none'; } 
            else { sliderSeccion.style.display = 'block'; }

            peliculas.forEach(pelicula => {
                const imagen = pelicula.querySelector('.movie-poster');
                const nombreArchivo = imagen.getAttribute('src').toLowerCase();
                const textoAlt = imagen.getAttribute('alt') ? imagen.getAttribute('alt').toLowerCase() : "";
                
                if (nombreArchivo.includes(textoBusqueda) || textoAlt.includes(textoBusqueda)) {
                    pelicula.classList.remove('hidden');
                } else {
                    pelicula.classList.add('hidden');
                }
            });
        });
    </script>
</body> 
</html>
